<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMA IA ADMIN</title>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    :root{
      --bg:#0d1117;
      --surface:#161b22;
      --surface2:#21262d;
      --border:#30363d;
      --accent:#2ea043;
      --danger:#f85149;
      --text:#e6edf3;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'IBM Plex Sans Arabic',sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:30px;
    }

    h1{
      margin-bottom:25px;
    }

    .table-wrap{
      overflow:auto;
      background:var(--surface);
      border-radius:18px;
      border:1px solid var(--border);
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th,td{
      padding:16px;
      border-bottom:1px solid var(--border);
      text-align:center;
    }

    th{
      background:var(--surface2);
    }

    .status{
      padding:6px 12px;
      border-radius:20px;
      font-size:12px;
      font-weight:700;
    }

    .pending{
      background:rgba(255,165,0,.12);
      color:orange;
    }

    .active{
      background:rgba(46,160,67,.12);
      color:#56d364;
    }

    .blocked{
      background:rgba(248,81,73,.12);
      color:#ff7b72;
    }

    button{
      border:none;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      color:white;
      margin:2px;
      font-weight:700;
    }

    .btn-active{
      background:var(--accent);
    }

    .btn-block{
      background:var(--danger);
    }

  </style>
</head>
<body>

<h1>لوحة تحكم AMA IA</h1>

<div class="table-wrap">

<table>

  <thead>
    <tr>
      <th>ID</th>
      <th>Username</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody id="usersTable"></tbody>

</table>

</div>

<script>

const SUPABASE_URL = "https://pcyklvvyymyvlbrhymzj.supabase.co/rest/v1/";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjeWtsdnZ5eW15dmxicmh5bXpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMTU4MzgsImV4cCI6MjA5MzY5MTgzOH0.eKBzaYFPf7PJntIOd_zdiKuvxkLkCIyGFX73RS9Aeow";


async function loadUsers(){

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/tolab?select=*`,
    {
      headers:{
        apikey:SUPABASE_KEY,
        Authorization:`Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const users = await res.json();

  const table = document.getElementById('usersTable');

  table.innerHTML = '';

  users.forEach(user => {

    table.innerHTML += `

      <tr>

        <td>${user.id}</td>

        <td>${user.username}</td>

        <td>
          <span class="status ${user.status}">
            ${user.status}
          </span>
        </td>

        <td>

          <button
            class="btn-active"
            onclick="updateStatus('${user.id}','active')"
          >
            تفعيل
          </button>

          <button
            class="btn-block"
            onclick="updateStatus('${user.id}','blocked')"
          >
            حظر
          </button>

        </td>

      </tr>

    `;

  });

}


async function updateStatus(id,status){

  await fetch(
    `${SUPABASE_URL}/rest/v1/tolab?id=eq.${id}`,
    {
      method:'PATCH',

      headers:{
        'Content-Type':'application/json',
        apikey:SUPABASE_KEY,
        Authorization:`Bearer ${SUPABASE_KEY}`
      },

      body:JSON.stringify({status})
    }
  );

  loadUsers();

}

loadUsers();

</script>

</body>
</html>
