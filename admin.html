<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMA IA ADMIN</title>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0d1117;
      --surface:#161b22;
      --surface2:#21262d;
      --border:#30363d;
      --accent:#2ea043;
      --danger:#f85149;
      --text:#e6edf3;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'IBM Plex Sans Arabic',sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:30px;
    }

    h1{
      margin-bottom:20px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .logout{
      background:var(--danger);
      border:none;
      padding:10px 14px;
      border-radius:10px;
      color:white;
      cursor:pointer;
      font-weight:700;
    }

    .table-wrap{
      overflow:auto;
      background:var(--surface);
      border-radius:18px;
      border:1px solid var(--border);
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th,td{
      padding:16px;
      border-bottom:1px solid var(--border);
      text-align:center;
    }

    th{
      background:var(--surface2);
    }

    .status{
      padding:6px 12px;
      border-radius:20px;
      font-size:12px;
      font-weight:700;
    }

    .pending{ background:rgba(255,165,0,.12); color:orange; }
    .active{ background:rgba(46,160,67,.12); color:#56d364; }
    .blocked{ background:rgba(248,81,73,.12); color:#ff7b72; }

    button.action{
      border:none;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      color:white;
      margin:2px;
      font-weight:700;
    }

    .btn-active{ background:var(--accent); }
    .btn-block{ background:var(--danger); }

    .loading{
      opacity:0.6;
      pointer-events:none;
    }

  </style>
</head>

<body>

<div class="topbar">
  <h1>لوحة تحكم AMA IA</h1>

  <button class="logout" onclick="logout()">
    تسجيل الخروج
  </button>
</div>

<div class="table-wrap">

<table>

  <thead>
    <tr>
      <th>ID</th>
      <th>Username</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody id="usersTable"></tbody>

</table>

</div>

<script>

const SUPABASE_URL = "https://pcyklvvyymyvlbrhymzj.supabase.co";
const SUPABASE_KEY = "sb_publishable_JnEOFW-KUOH12hok-N6g-g_bCkGt3AX";


// =========================
// SECURITY CHECK (IMPORTANT)
// =========================
const user = JSON.parse(localStorage.getItem("taleb"));

if(!user){
  window.location.href = "index.html";
}

if(user.niveau !== "admin"){
  alert("❌ غير مسموح");
  window.location.href = "index.html";
}


// =========================
// LOGOUT
// =========================
function logout(){
  localStorage.removeItem("taleb");
  window.location.href = "index.html";
}


// =========================
// LOAD USERS
// =========================
async function loadUsers(){

  const table = document.getElementById("usersTable");
  table.innerHTML = "جاري التحميل...";

  try{

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/tolab?select=*`,
      {
        headers:{
          apikey:SUPABASE_KEY,
          Authorization:`Bearer ${SUPABASE_KEY}`
        }
      }
    );

    const users = await res.json();

    table.innerHTML = "";

    users.forEach(user => {

      table.innerHTML += `
        <tr>

          <td>${user.id}</td>
          <td>${user.username}</td>

          <td>
            <span class="status ${user.status}">
              ${user.status}
            </span>
          </td>

          <td>

            <button class="action btn-active"
              onclick="updateStatus('${user.id}','active')">
              تفعيل
            </button>

            <button class="action btn-block"
              onclick="updateStatus('${user.id}','blocked')">
              حظر
            </button>

          </td>

        </tr>
      `;

    });

  }catch(err){
    table.innerHTML = "❌ خطأ في تحميل البيانات";
  }

}


// =========================
// UPDATE STATUS
// =========================
async function updateStatus(id,status){

  try{

    await fetch(
      `${SUPABASE_URL}/rest/v1/tolab?id=eq.${id}`,
      {
        method:"PATCH",
        headers:{
          "Content-Type":"application/json",
          apikey:SUPABASE_KEY,
          Authorization:`Bearer ${SUPABASE_KEY}`
        },
        body:JSON.stringify({status})
      }
    );

    loadUsers();

  }catch(err){
    alert("خطأ في التحديث");

  }

}


// INIT
loadUsers();

</script>

</body>
</html>
