<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AMA Learning | منصة التعلم الذكي</title>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --secondary: #0ea5e9;
      --bg-main: #f8fafc;
      --surface: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --success: #22c55e;
      --warning: #f59e0b;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --radius: 12px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'IBM Plex Sans Arabic', sans-serif; background:var(--bg-main); color:var(--text-main); line-height:1.6; }

    /* TOPBAR */
    .topbar { background:rgba(255,255,255,0.85); backdrop-filter:blur(12px); border-bottom:1px solid var(--border-color); height:70px; display:flex; align-items:center; justify-content:space-between; padding:0 5%; position:sticky; top:0; z-index:1000; }
    .topbar-brand { display:flex; align-items:center; gap:12px; }
    .topbar-brand img { width:42px; height:42px; border-radius:10px; }
    .topbar-title { font-size:20px; font-weight:700; color:var(--primary); }
    .topbar-user { display:flex; align-items:center; gap:12px; }
    .user-badge { background:#f1f5f9; padding:7px 14px; border-radius:20px; font-size:13px; font-weight:500; border:1px solid var(--border-color); }
    .user-badge span { color:var(--primary); font-weight:700; }
    .btn-chat { background:var(--primary); color:white; border:none; padding:9px 18px; border-radius:10px; cursor:pointer; font-weight:600; font-family:inherit; }
    .btn-chat:hover { background:var(--primary-hover); }
    .btn-logout { background:transparent; color:#ef4444; border:1px solid #fee2e2; padding:7px 14px; border-radius:10px; cursor:pointer; font-family:inherit; }

    .main { max-width:1100px; margin:36px auto; padding:0 20px; }

    /* STATS */
    .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:36px; }
    .stat-card { background:var(--surface); padding:22px; border-radius:var(--radius); box-shadow:var(--shadow); text-align:center; border:1px solid var(--border-color); }
    .stat-val { font-size:26px; font-weight:800; color:var(--primary); font-family:'JetBrains Mono'; }
    .stat-label { color:var(--text-muted); font-size:13px; margin-top:4px; }

    /* SECTION TITLE */
    .section-title { font-size:17px; font-weight:700; margin-bottom:18px; display:flex; align-items:center; gap:12px; }
    .section-title::after { content:''; flex:1; height:2px; background:var(--border-color); }

    /* COURS PPTX GRID */
    .cours-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; margin-bottom:40px; }
    .cours-card { background:white; border-radius:var(--radius); border:1px solid var(--border-color); overflow:hidden; transition:0.25s; cursor:pointer; }
    .cours-card:hover { border-color:var(--primary); transform:translateY(-3px); box-shadow:var(--shadow); }
    .cours-card-thumb { background:linear-gradient(135deg,#eef2ff,#e0e7ff); height:100px; display:flex; align-items:center; justify-content:center; font-size:40px; }
    .cours-card-body { padding:14px 16px; }
    .cours-card-title { font-size:13px; font-weight:700; color:var(--text-main); margin-bottom:6px; word-break:break-word; }
    .cours-card-meta { font-size:11px; color:var(--text-muted); }
    .cours-card-btn { display:block; width:100%; background:#f1f5f9; border:none; padding:10px; font-weight:600; font-family:inherit; cursor:pointer; border-top:1px solid var(--border-color); transition:0.2s; }
    .cours-card-btn:hover { background:var(--primary); color:white; }

    /* LESSONS */
    .doros-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:20px; margin-bottom:40px; }
    .dars-card { background:white; border-radius:var(--radius); padding:20px; border:1px solid var(--border-color); transition:0.3s; }
    .dars-card:hover { border-color:var(--primary); transform:translateY(-4px); }
    .dars-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:15px; }
    .dars-icon-wrapper { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; background:#f8fafc; font-size:24px; }
    .dars-niveau { font-size:10px; font-weight:700; padding:4px 10px; border-radius:6px; }
    .n1ac { background:#e0e7ff; color:#4338ca; }
    .n2ac { background:#fef3c7; color:#92400e; }
    .n3ac { background:#dcfce7; color:#166534; }
    .dars-title { font-size:17px; font-weight:700; margin-bottom:8px; }
    .dars-desc { font-size:13px; color:var(--text-muted); margin-bottom:20px; }
    .dars-footer { display:flex; justify-content:space-between; align-items:center; border-top:1px solid #f1f5f9; padding-top:15px; }
    .status-done { color:var(--success); }
    .status-todo { color:var(--warning); }
    .btn-open { background:#f1f5f9; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; font-weight:600; font-family:inherit; }
    .btn-open:hover { background:var(--primary); color:white; }

    /* PROGRESS */
    .prog-item { background:white; border:1px solid var(--border-color); border-radius:var(--radius); padding:20px; margin-bottom:12px; }
    .prog-info { display:flex; justify-content:space-between; margin-bottom:10px; font-weight:600; }
    .prog-bar-bg { height:8px; background:#f1f5f9; border-radius:10px; overflow:hidden; }
    .prog-bar-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--secondary)); }

    /* MODAL COURS */
    .modal-overlay { position:fixed; inset:0; background:rgba(15,23,42,0.8); display:none; align-items:center; justify-content:center; padding:16px; z-index:2000; }
    .modal-overlay.active { display:flex; }
    .modal { background:white; width:100%; max-width:900px; border-radius:20px; overflow:hidden; display:flex; flex-direction:column; max-height:90vh; }
    .modal-header { padding:20px 24px; background:#f8fafc; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border-color); flex-shrink:0; }
    .modal-header h2 { font-size:15px; font-weight:700; word-break:break-word; flex:1; padding-left:12px; }
    .modal-close { background:none; border:none; font-size:22px; cursor:pointer; color:var(--text-muted); flex-shrink:0; }
    .modal-viewer { flex:1; overflow:hidden; min-height:400px; }
    .modal-viewer iframe { width:100%; height:100%; min-height:500px; border:none; display:block; }
    .modal-viewer-loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:400px; gap:12px; color:var(--text-muted); }
    .spinner { width:40px; height:40px; border:4px solid #e2e8f0; border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .modal-actions-bar { padding:14px 24px; background:#f8fafc; border-top:1px solid var(--border-color); display:flex; gap:10px; flex-shrink:0; }
    .btn-dl { background:var(--primary); color:white; border:none; padding:10px 18px; border-radius:9px; cursor:pointer; font-weight:600; font-family:inherit; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
    .btn-dl:hover { background:var(--primary-hover); }
    .btn-ai-bar { background:var(--secondary); color:white; border:none; padding:10px 18px; border-radius:9px; cursor:pointer; font-weight:600; font-family:inherit; }

    /* MODAL DARS */
    .modal-body { padding:28px; max-height:55vh; overflow:auto; }
    .modal-body li { background:#f8fafc; margin-bottom:8px; padding:10px; border-radius:8px; list-style:none; border-right:4px solid var(--primary); }
    .modal-dars-actions { display:flex; gap:12px; padding:18px 24px; background:#f8fafc; border-top:1px solid var(--border-color); }
    .btn-main, .btn-ai { flex:1; border:none; padding:12px; border-radius:10px; color:white; cursor:pointer; font-weight:700; font-family:inherit; }
    .btn-main { background:var(--success); }
    .btn-ai { background:var(--secondary); }

    /* LOADING STATE */
    .loading-placeholder { text-align:center; padding:40px; color:var(--text-muted); }

    @media(max-width:768px) {
      .stats-grid { grid-template-columns:1fr; }
      .cours-grid { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <img src="./images/logos/logo.png" alt="Logo">
    <div class="topbar-title">AMA Learning</div>
  </div>
  <div class="topbar-user">
    <div class="user-badge">مرحباً، <span id="topbarName">...</span></div>
    <button class="btn-chat" onclick="window.location.href='chat.html'">AI AMA 💬</button>
    <button class="btn-logout" onclick="logout()">خروج</button>
  </div>
</div>

<div class="main">

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-val" id="statTotal">0</div>
      <div class="stat-label">إجمالي الدروس</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statDone">0</div>
      <div class="stat-label">الدروس المكتملة</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statScore">0%</div>
      <div class="stat-label">نسبة الإنجاز</div>
    </div>
  </div>

  <!-- COURS PPTX AUTOMATIQUES -->
  <div class="section-title">📂 ملفات الدروس — PowerPoint</div>
  <div class="cours-grid" id="coursGrid">
    <div class="loading-placeholder">⏳ جاري تحميل الملفات...</div>
  </div>

  <!-- LESSONS -->
  <div class="section-title">📖 استكشف الدروس</div>
  <div class="doros-grid" id="dorosGrid"></div>

  <!-- PROGRESS -->
  <div id="progSection"></div>

</div>

<!-- MODAL LECTEUR PPTX -->
<div class="modal-overlay" id="coursModal">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeCoursModal()">✕</button>
      <h2 id="coursModalTitle">...</h2>
    </div>
    <div class="modal-viewer" id="coursModalViewer">
      <div class="modal-viewer-loading">
        <div class="spinner"></div>
        <span>جاري تحميل الملف...</span>
      </div>
    </div>
    <div class="modal-actions-bar">
      <a id="coursModalDl" href="#" download class="btn-dl">⬇️ تحميل الملف</a>
      <button class="btn-ai-bar" onclick="askAIFromCours()">AMA AI 💬</button>
    </div>
  </div>
</div>

<!-- MODAL DARS -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" style="max-width:650px;">
    <div class="modal-header">
      <button onclick="closeModalDirect()" style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button>
      <h2 id="modalTitle"></h2>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-dars-actions">
      <button class="btn-main" onclick="markDone()">✅ تم الإنجاز</button>
      <button class="btn-ai" onclick="askAI()">AMA AI</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://pcyklvvyymyvlbrhymzj.supabase.co";
const SUPABASE_KEY = "sb_publishable_JnEOFW-KUOH12hok-N6g-g_bCkGt3AX";
const GITHUB_BASE  = "https://ayoubamhr.github.io/chat-ai-amahrouch";
const COURS_JSON   = `${GITHUB_BASE}/data/cours.json`;

const taleb = JSON.parse(localStorage.getItem('taleb') || 'null');
if (!taleb) window.location.href = 'index.html';
document.getElementById('topbarName').textContent = taleb?.nom || '';

let doros = [];
let progression = {};
let currentDars = null;
let currentCoursName = '';

/* ═══════════════════════════════════════
   COURS PPTX — chargement automatique
═══════════════════════════════════════ */
async function loadCoursPPTX() {
  const grid = document.getElementById('coursGrid');
  try {
    // On ajoute ?t= pour éviter le cache du navigateur
    const res = await fetch(`${COURS_JSON}?t=${Date.now()}`);
    if (!res.ok) throw new Error('Fichier cours.json introuvable');
    const list = await res.json();

    if (!list.length) {
      grid.innerHTML = '<div class="loading-placeholder">لا توجد ملفات بعد</div>';
      return;
    }

    grid.innerHTML = '';
    list.forEach(cours => {
      const card = document.createElement('div');
      card.className = 'cours-card';
      card.innerHTML = `
        <div class="cours-card-thumb">📊</div>
        <div class="cours-card-body">
          <div class="cours-card-title">${cours.name}</div>
          <div class="cours-card-meta">PowerPoint • PPTX</div>
        </div>
        <button class="cours-card-btn" onclick="openCours('${encodeURIComponent(cours.name)}','${encodeURIComponent(cours.url)}')">
          👁️ عرض الدرس
        </button>
      `;
      grid.appendChild(card);
    });

  } catch(e) {
    grid.innerHTML = `<div class="loading-placeholder">⚠️ تعذّر تحميل الملفات<br><small>${e.message}</small></div>`;
  }
}

/* ═══════════════════════════════════════
   LECTEUR PPTX
═══════════════════════════════════════ */
function openCours(encodedName, encodedUrl) {
  const name = decodeURIComponent(encodedName);
  const url  = decodeURIComponent(encodedUrl);
  currentCoursName = name;

  document.getElementById('coursModalTitle').textContent = name;
  document.getElementById('coursModalDl').href = url;
  document.getElementById('coursModalDl').setAttribute('download', name);

  // Lecteur Google Docs Viewer
  const viewerUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`;
  document.getElementById('coursModalViewer').innerHTML = `
    <iframe src="${viewerUrl}" allowfullscreen></iframe>
  `;

  document.getElementById('coursModal').classList.add('active');
}

function closeCoursModal() {
  document.getElementById('coursModal').classList.remove('active');
  document.getElementById('coursModalViewer').innerHTML = `
    <div class="modal-viewer-loading">
      <div class="spinner"></div>
      <span>جاري تحميل الملف...</span>
    </div>
  `;
}

function askAIFromCours() {
  localStorage.setItem('aiQuestion', `أريد شرحاً لدرس: ${currentCoursName}`);
  window.location.href = 'chat.html';
}

/* ═══════════════════════════════════════
   COURSES JSON (data/courses.json)
═══════════════════════════════════════ */
async function loadCourses() {
  try {
    const response = await fetch('./data/courses.json');
    doros = await response.json();
    renderDoros();
    renderStats();
    renderProgression();
  } catch(error) {
    console.error('Erreur chargement cours:', error);
  }
}

async function loadProgression() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/progression?taleb_id=eq.${taleb.id}&select=*`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const data = await res.json();
    data.forEach(p => { progression[p.dars] = p; });
  } catch(e) { console.log('Error loading progression', e); }
}

function renderDoros() {
  const grid = document.getElementById('dorosGrid');
  grid.innerHTML = '';
  doros.forEach(dars => {
    const done = progression[dars.id]?.completed;
    const card = document.createElement('div');
    card.className = 'dars-card';
    card.innerHTML = `
      <div class="dars-header">
        <div class="dars-icon-wrapper">${dars.icon}</div>
        <span class="dars-niveau ${dars.couleur}">${dars.niveau}</span>
      </div>
      <div class="dars-title">${dars.titre}</div>
      <div class="dars-desc">${dars.desc}</div>
      <div class="dars-footer">
        <span class="${done ? 'status-done' : 'status-todo'}">${done ? '✅ مكتمل' : '🕒 قيد الانتظار'}</span>
        <button class="btn-open" onclick="openDars('${dars.id}')">عرض المحتوى</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function renderStats() {
  const total = doros.length;
  const done  = doros.filter(d => progression[d.id]?.completed).length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent  = done;
  document.getElementById('statScore').textContent = pct + '%';
}

function renderProgression() {
  const sec = document.getElementById('progSection');
  sec.innerHTML = '';
  ['1AC','2AC','3AC'].forEach(niv => {
    const nivDoros = doros.filter(d => d.niveau === niv);
    const done = nivDoros.filter(d => progression[d.id]?.completed).length;
    const pct  = nivDoros.length ? Math.round(done / nivDoros.length * 100) : 0;
    const item = document.createElement('div');
    item.className = 'prog-item';
    item.innerHTML = `
      <div class="prog-info"><span>${niv}</span><span>${pct}%</span></div>
      <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
    `;
    sec.appendChild(item);
  });
}

function openDars(id) {
  currentDars = doros.find(d => d.id === id);
  document.getElementById('modalTitle').textContent = currentDars.titre;
  let html = `<h3>وصف الدرس</h3><p>${currentDars.desc}</p><h3>المحاور الرئيسية</h3><ul>`;
  currentDars.contenu.forEach(c => { html += `<li>${c}</li>`; });
  html += '</ul>';
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('active'); }
function closeModal(e) { if(e.target.id === 'modalOverlay') closeModalDirect(); }

async function markDone() {
  if (!currentDars) return;
  try {
    const existing = progression[currentDars.id];
    if(existing) {
      await fetch(`${SUPABASE_URL}/rest/v1/progression?id=eq.${existing.id}`, {
        method:'PATCH',
        headers:{ 'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json' },
        body:JSON.stringify({ completed:true })
      });
      progression[currentDars.id].completed = true;
    } else {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/progression`, {
        method:'POST',
        headers:{ 'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=representation' },
        body:JSON.stringify({ taleb_id:taleb.id, dars:currentDars.id, completed:true, score:100 })
      });
      const data = await res.json();
      if(data[0]) progression[currentDars.id] = data[0];
    }
    closeModalDirect();
    renderDoros(); renderStats(); renderProgression();
  } catch(e) { console.error(e); }
}

function askAI() {
  localStorage.setItem('aiQuestion', `أريد شرحاً مفصلاً لدرس: ${currentDars.titre}`);
  window.location.href = 'chat.html';
}

function logout() {
  localStorage.removeItem('taleb');
  window.location.href = 'login.html';
}

/* INIT */
(async () => {
  await loadProgression();
  await loadCourses();
  await loadCoursPPTX();   // ← charge automatiquement les PPTX depuis cours.json
})();
</script>

</body>
</html>
