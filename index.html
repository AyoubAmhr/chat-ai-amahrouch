<!DOCTYPE html>
<html>
<head>
  <title>AGULMAM IA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667CCa 0%, #769877 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 600px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 25px;
      text-align: center;
    }

    .header h2 { font-size: 28px; margin-bottom: 5px; }
    .header p { font-size: 13px; opacity: 0.9; }

    .chat-box {
      height: 400px;
      overflow-y: auto;
      padding: 20px;
      background: #f9f9f9;
      border-bottom: 2px solid #eee;
    }

    .message {
      margin-bottom: 15px;
      display: flex;
      gap: 10px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user-message { justify-content: flex-end; }

    .user-text {
      background: #667eea;
      color: white;
      padding: 12px 15px;
      border-radius: 15px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .ai-text {
      background: #e0e0e0;
      color: #333;
      padding: 12px 15px;
      border-radius: 15px;
      max-width: 80%;
      word-wrap: break-word;
      line-height: 1.5;
    }

    .ai-icon { font-size: 24px; min-width: 30px; }

    .input-area {
      padding: 20px;
      background: white;
      display: flex;
      gap: 10px;
    }

    #msg {
      flex: 1;
      padding: 12px 15px;
      border: 2px solid #eee;
      border-radius: 25px;
      font-size: 14px;
    }

    #msg:focus { outline: none; border-color: #667eea; }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
    }

    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #999;
    }

    .dot {
      width: 8px; height: 8px;
      background: #667eea;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%,80%,100% { transform: scaleY(0.5); opacity: 0.5; }
      40% { transform: scaleY(1); opacity: 1; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>AGULMAM IA</h2>
    <p>Powered by Groq + n8n</p>
  </div>

  <div id="chatBox" class="chat-box"></div>

  <div class="input-area">
    <input id="msg" placeholder="كتب سؤالك هنا..." onkeypress="if(event.key=='Enter') send()">
    <button id="sendBtn" onclick="send()">Send</button>
  </div>
</div>

<script>
const WEBHOOK_URL = "https://ayoubamahrouch.app.n8n.cloud/webhook/chat-ai";

function addMessage(text, isUser = false) {
  const chatBox = document.getElementById("chatBox");
  const div = document.createElement("div");
  div.className = "message" + (isUser ? " user-message" : "");
  div.innerHTML = isUser
    ? `<div class="user-text">${escapeHtml(text)}</div>`
    : `<div class="ai-icon">🤖</div><div class="ai-text">${escapeHtml(text)}</div>`;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function escapeHtml(text) {
  const d = document.createElement("div");
  d.textContent = text;
  return d.innerHTML;
}

function showLoading() {
  const chatBox = document.getElementById("chatBox");
  const div = document.createElement("div");
  div.id = "loading";
  div.className = "message";
  div.innerHTML = `
    <div class="ai-icon">🤖</div>
    <div class="loading">
      <span>Loading</span>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>`;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById("loading");
  if (el) el.remove();
}

async function fetchWithRetry(url, options, retries = 3) {
  for (let i = 0; i < retries; i++) {
    try {
      const res = await fetch(url, options);

      // Get raw text first
      const text = await res.text();

      // If empty response, retry
      if (!text || text.trim() === "") {
        if (i < retries - 1) {
          await new Promise(r => setTimeout(r, 1000));
          continue;
        }
        throw new Error("Réponse vide du serveur");
      }

      // Parse JSON
    try {
  const data = JSON.parse(text);
    return data;
        } catch (e) {
      // Ila machi JSON — rja3 text directly khabar reply
      return { reply: text };
      }

    } catch (err) {
      if (i === retries - 1) throw err;
      await new Promise(r => setTimeout(r, 1000 * (i + 1)));
    }
  }
}

async function send() {
  const msg = document.getElementById("msg");
  const sendBtn = document.getElementById("sendBtn");

  if (!msg.value.trim()) return;

  addMessage(msg.value, true);
  const userMessage = msg.value;
  msg.value = "";
  sendBtn.disabled = true;
  showLoading();

  try {
    const data = await fetchWithRetry(WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: userMessage })
    });

    removeLoading();

    const reply = data.reply
      || data.choices?.[0]?.message?.content
      || data.message
      || "Machi jawab";

    addMessage(reply, false);

  } catch (err) {
    removeLoading();
    addMessage("Khata: " + err.message, false);
  }

  sendBtn.disabled = false;
  msg.focus();
}
</script>

</body>
</html>
