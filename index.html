<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMA IA — تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --accent: #2ea043;
      --accent2: #388bfd;
      --text: #e6edf3;
      --text-muted: #7d8590;
      --text-dim: #484f58;
      --error: #f85149;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 20px;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

   

    .logo-title {
      font-size: 24px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      margin-bottom: 6px;
    }

    .logo-sub {
      font-size: 13px;
      color: var(--text-muted);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--text);
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 6px;
      font-family: 'JetBrains Mono', monospace;
    }

    .field input {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      direction: ltr;
    }

    .field input:focus { border-color: var(--accent2); }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      transition: all 0.15s;
      margin-top: 8px;
    }

    .btn-login:hover:not(:disabled) { background: #3fb950; transform: translateY(-1px); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--error);
      margin-top: 12px;
      display: none;
    }

    .footer-txt {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    .footer-txt span { color: var(--accent2); }

    .loading-spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-left: 8px;
    }


    /* LOGIN CONTAINER */
.login-wrap{
    width: 100%;
    max-width: 420px;
    margin: auto;
    padding: 40px 30px;
    border-radius: 25px;

    /* Glass Effect */
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);

    box-shadow: 0 10px 35px rgba(0,0,0,0.25);

    text-align: center;
}

/* LOGO AREA */
.logo-area{
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 25px;
}

/* LOGO IMAGE */
.logo-area img{
    width: 170px !important;
    height: 170px !important;
    object-fit: contain;

    padding: 12px;
    border-radius: 50%;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);

    box-shadow: 0 8px 25px rgba(0,0,0,0.25);

    transition: 0.4s ease;
}

/* HOVER EFFECT */
.logo-area img:hover{
    transform: scale(1.05) rotate(3deg);
    box-shadow: 0 12px 35px rgba(0,0,0,0.35);
}

/* TITLE */
.logo-title{
    margin-top: 18px;
    font-size: 32px;
    font-weight: 700;
    color: white;
    letter-spacing: 2px;
    text-shadow: 0 4px 10px rgba(0,0,0,0.25);
}

/* SUBTITLE */
.logo-sub{
    margin-top: 8px;
    font-size: 17px;
    color: rgba(255,255,255,0.85);
    font-weight: 500;
    letter-spacing: 1px;
}

/* RESPONSIVE */
@media(max-width: 500px){

    .login-wrap{
        padding: 30px 20px;
    }

    .logo-area img{
        width: 130px !important;
        height: 130px !important;
    }

    .logo-title{
        font-size: 26px;
    }

    .logo-sub{
        font-size: 15px;
    }
}

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="logo-area">
    <img style="height: 250px; width: 250px;" src="./images/logos/logo.png" alt="">
    <div class="logo-title">AMA IA</div>
    <div class="logo-sub">منصتك التعليمية</div>
  </div>

  <div class="card">
    <div class="card-title">تسجيل الدخول</div>

    <div class="field">
      <label>USERNAME</label>
      <input id="username" type="text" placeholder="اسم المستخدم" autocomplete="username">
    </div>

    <div class="field">
      <label>PASSWORD</label>
      <input id="password" type="password" placeholder="كلمة المرور" autocomplete="current-password" onkeypress="if(event.key==='Enter') login()">
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()">دخول</button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="footer-txt">by <span>AMAHROUCH AYOUB</span> • AGULMAM IA</div>
</div>

<script>
const SUPABASE_URL = "https://pcyklvvyymyvlbrhymzj.supabase.co";
const SUPABASE_KEY = "sb_publishable_JnEOFW-KUOH12hok-N6g-g_bCkGt3AX";

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');

  if (!username || !password) {
    showError('أكمل username و password');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = 'جاري التحقق <span class="loading-spinner"></span>';
  err.style.display = 'none';

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/tolab?username=eq.${encodeURIComponent(username)}&password=eq.${encodeURIComponent(password)}&select=*`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });

    const data = await res.json();

    if (data && data.length > 0) {
      const taleb = data[0];
      localStorage.setItem('taleb', JSON.stringify(taleb));
      window.location.href = 'dashboard.html';
    } else {
      showError('username أو password غلط');
    }
  } catch (e) {
    showError('خطأ في الاتصال: ' + e.message);
  }

  btn.disabled = false;
  btn.innerHTML = 'دخول';
}

function showError(msg) {
  const err = document.getElementById('errorMsg');
  err.textContent = msg;
  err.style.display = 'block';
}

// Check already logged in
if (localStorage.getItem('taleb')) {
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
