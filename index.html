<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGULMAM IA — إعلاميات الإعدادي</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --accent: #2ea043;
      --accent2: #388bfd;
      --accent3: #f78166;
      --text: #e6edf3;
      --text-muted: #7d8590;
      --text-dim: #484f58;
      --user-bg: #1f4788;
      --code-bg: #010409;
      --tag-green: rgba(46,160,67,0.15);
      --tag-blue: rgba(56,139,253,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }

    .app {
      width: 100%;
      max-width: 720px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo-box {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-info { flex: 1; }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }

    .header-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .header-tags { display: flex; gap: 6px; }

    .tag {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    .tag-green { background: var(--tag-green); color: var(--accent); border: 1px solid rgba(46,160,67,0.3); }
    .tag-blue  { background: var(--tag-blue);  color: var(--accent2); border: 1px solid rgba(56,139,253,0.3); }

    /* LEVELS */
    .levels-bar {
      padding: 8px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      overflow-x: auto;
      flex-shrink: 0;
    }

    .levels-bar::-webkit-scrollbar { display: none; }

    .level-btn {
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      white-space: nowrap;
      transition: all 0.15s;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
    }

    .level-btn:hover, .level-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* CHAT */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
      background: var(--bg);
    }

    .chat::-webkit-scrollbar { width: 4px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* WELCOME */
    .welcome {
      margin: auto;
      text-align: center;
      padding: 30px 16px;
      max-width: 400px;
    }

    .welcome-icon { font-size: 44px; margin-bottom: 12px; display: block; }
    .welcome h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .welcome p { font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 20px; }

    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .quick-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: right;
    }

    .quick-card:hover { border-color: var(--accent); background: var(--surface2); }
    .quick-card-icon { font-size: 18px; margin-bottom: 4px; }
    .quick-card-text { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

    /* MESSAGES */
    .msg-row {
      display: flex;
      gap: 10px;
      animation: msgIn 0.25s ease;
      align-items: flex-start;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-avatar.ai   { background: var(--accent); font-size: 14px; }
    .msg-avatar.user { background: var(--user-bg); font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: #79c0ff; }

    .msg-content { max-width: 78%; }

    .msg-name {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .msg-bubble {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.8;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .msg-row.ai   .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 2px 10px 10px 10px; }
    .msg-row.user .msg-bubble { background: var(--user-bg); color: #cae8ff; border-radius: 10px 2px 10px 10px; text-align: right; }

    .msg-time { font-size: 10px; color: var(--text-dim); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
    .msg-row.user .msg-time { text-align: left; }

    /* TYPING */
    .typing-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 14px 16px;
      border-radius: 2px 10px 10px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .typing-label { font-size: 12px; color: var(--text-muted); }
    .dots { display: flex; gap: 4px; align-items: center; }

    .dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: dotPulse 1.4s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
    .dot:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }

    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    /* INPUT */
    .input-area {
      padding: 12px 20px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 8px 8px 12px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within { border-color: var(--accent2); }

    #msg {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--text);
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      direction: rtl;
      padding: 4px 0;
    }

    #msg::placeholder { color: var(--text-dim); }

    .send-btn {
      width: 36px; height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 7px;
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .send-btn:hover:not(:disabled) { background: #3fb950; transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      padding: 0 2px;
    }

    .input-hint  { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
    .footer-brand { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
    .footer-brand span { color: var(--accent2); }

    @media (max-width: 480px) {
      .header-tags { display: none; }
      .quick-grid  { grid-template-columns: 1fr; }
      .msg-content { max-width: 88%; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo-box">💻</div>
    <div class="header-info">
      <div class="header-title">AGULMAM IA</div>
      <div class="header-sub">مساعد الإعلاميات — التعليم الإعدادي المغربي</div>
    </div>
    <div class="header-tags">
      <span class="tag tag-green">● Online</span>
      <span class="tag tag-blue">Groq AI</span>
    </div>
  </div>

  <div class="levels-bar">
    <button class="level-btn active" onclick="setLevel(this,'')">🎯 الكل</button>
    <button class="level-btn" onclick="setLevel(this,'السنة الأولى إعدادي')">1AC</button>
    <button class="level-btn" onclick="setLevel(this,'السنة الثانية إعدادي')">2AC</button>
    <button class="level-btn" onclick="setLevel(this,'السنة الثالثة إعدادي')">3AC</button>
    <button class="level-btn" onclick="quickAsk('شرح ليا نظام التشغيل')">🖥️ OS</button>
    <button class="level-btn" onclick="quickAsk('شرح ليا البرمجة بـ Logo')">⌨️ Logo</button>
    <button class="level-btn" onclick="quickAsk('شرح ليا الشبكات المعلوماتية')">🌐 Réseaux</button>
    <button class="level-btn" onclick="quickAsk('عطيني تمرين على جداول البيانات')">📊 Tableur</button>
  </div>

  <div class="chat" id="chat">
    <div class="welcome" id="welcome">
      <span class="welcome-icon">💻</span>
      <h2>أهلاً! أنا AGULMAM IA</h2>
      <p>متخصص في مادة الإعلاميات للتعليم الإعدادي المغربي.<br>كيفاش نقدر نعاونك اليوم؟</p>
      <div class="quick-grid">
        <div class="quick-card" onclick="quickAsk('شرح ليا الجهاز المعلوماتي ومكوناته')">
          <div class="quick-card-icon">🖥️</div>
          <div class="quick-card-text">الجهاز المعلوماتي</div>
        </div>
        <div class="quick-card" onclick="quickAsk('شرح ليا نظام التشغيل Windows')">
          <div class="quick-card-icon">⚙️</div>
          <div class="quick-card-text">نظام التشغيل</div>
        </div>
        <div class="quick-card" onclick="quickAsk('شرح ليا الشبكات المعلوماتية وأنواعها')">
          <div class="quick-card-icon">🌐</div>
          <div class="quick-card-text">الشبكات المعلوماتية</div>
        </div>
        <div class="quick-card" onclick="quickAsk('كيفاش نبرمج بلغة Logo؟')">
          <div class="quick-card-icon">⌨️</div>
          <div class="quick-card-text">البرمجة بـ Logo</div>
        </div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input id="msg" type="text" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter') send()">
      <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
    </div>
    <div class="input-footer">
      <span class="input-hint">Enter لإرسال</span>
      <span class="footer-brand">by <span>AMAHROUCH AYOUB</span></span>
    </div>
  </div>

</div>
<script>
const WEBHOOK_URL = "https://ayoubamahrouch.app.n8n.cloud/webhook/chat-ai";
let currentLevel = '';

function setLevel(btn, level) {
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentLevel = level;
}

function getTime() {
  return new Date().toLocaleTimeString('fr-MA', { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function removeWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function addMessage(text, isUser = false) {
  removeWelcome();
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = `msg-row ${isUser ? 'user' : 'ai'}`;

  if (isUser) {
    row.innerHTML = `
      <div class="msg-avatar user">AA</div>
      <div class="msg-content">
        <div class="msg-bubble">${escapeHtml(text)}</div>
        <div class="msg-time">${getTime()}</div>
      </div>`;
  } else {
    row.innerHTML = `
      <div class="msg-avatar ai">🤖</div>
      <div class="msg-content">
        <div class="msg-name">AGULMAM IA</div>
        <div class="msg-bubble">${escapeHtml(text)}</div>
        <div class="msg-time">${getTime()}</div>
      </div>`;
  }

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  removeWelcome();
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = 'typing';
  row.innerHTML = `
    <div class="msg-avatar ai">🤖</div>
    <div class="msg-content">
      <div class="msg-name">AGULMAM IA</div>
      <div class="typing-bubble">
        <span class="typing-label">كيتفكر...</span>
        <div class="dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
    </div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function quickAsk(text) {
  document.getElementById('msg').value = text;
  send();
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function fetchWithRetry(url, options, retries = 3) {
  for (let i = 0; i < retries; i++) {
    try {
      const res = await fetch(url, options);
      const text = await res.text();
      if (!text || !text.trim()) {
        if (i < retries - 1) { await sleep(1000); continue; }
        throw new Error('الخادم ما رد');
      }
      try { return JSON.parse(text); }
      catch { return { reply: text }; }
    } catch (err) {
      if (i === retries - 1) throw err;
      await sleep(1000 * (i + 1));
    }
  }
}

async function send() {
  const msg = document.getElementById('msg');
  const btn = document.getElementById('sendBtn');
  if (!msg.value.trim()) return;

  const userMsg = currentLevel ? `[${currentLevel}] ${msg.value}` : msg.value;
  addMessage(msg.value, true);
  msg.value = '';
  btn.disabled = true;
  showTyping();

  try {
    const data = await fetchWithRetry(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: userMsg })
    });
    removeTyping();
    const reply = data.reply || data.choices?.[0]?.message?.content || data.message || 'معندي جواب دابا';
    addMessage(reply, false);
  } catch (err) {
    removeTyping();
    addMessage('خطأ: ' + err.message, false);
  }

  btn.disabled = false;
  msg.focus();
}
</script>
</body>
</html>
