<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMA IA</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
      --border: #30363d; --accent: #2ea043; --accent2: #388bfd;
      --accent3: #f78166; --text: #e6edf3; --text-muted: #7d8590; --text-dim: #484f58;
      --user-bg: #1f4788;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; height: 100dvh;
    }

   /* TOPBAR */
.topbar{
    width: 100%;
    height: 80px;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 25px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);

    border-bottom: 1px solid rgba(255,255,255,0.1);

    position: sticky;
    top: 0;
    z-index: 1000;
}

/* BACK BUTTON */
.btn-back{
    padding: 10px 18px;
    border: none;
    border-radius: 12px;

    background: rgba(255,255,255,0.12);
    color: white;

    font-size: 15px;
    cursor: pointer;

    transition: 0.3s;
}

.btn-back:hover{
    background: rgba(255,255,255,0.2);
    transform: translateY(-2px);
}

/* BRAND */
.topbar-brand{
    display: flex;
    align-items: center;
    gap: 12px;
}

/* LOGO */
.topbar-brand img{
    width: 55px;
    height: 55px;

    object-fit: contain;

    border-radius: 50%;
    padding: 5px;

    background: rgba(255,255,255,0.12);

    box-shadow: 0 4px 15px rgba(0,0,0,0.2);

    transition: 0.4s;
}

.topbar-brand img:hover{
    transform: rotate(5deg) scale(1.05);
}

/* TITLE */
.topbar-title{
    font-size: 24px;
    font-weight: 700;

    color: white;

    letter-spacing: 1px;
}

/* USER */
.topbar-user{
    color: rgba(255,255,255,0.9);
    font-size: 15px;
}

/* CHAT AREA */
.chat{
    width: 100%;
    height: calc(100vh - 80px);

    display: flex;
    justify-content: center;
    align-items: center;

    padding: 20px;
}

/* WELCOME */
.welcome{
    text-align: center;

    max-width: 600px;

    padding: 40px 30px;

    border-radius: 25px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);

    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

/* WELCOME LOGO */
.welcome-logo{
    width: 140px;
    height: 140px;

    object-fit: contain;

    border-radius: 50%;

    padding: 10px;

    background: rgba(255,255,255,0.12);

    box-shadow: 0 8px 25px rgba(0,0,0,0.25);

    margin-bottom: 20px;

    transition: 0.4s ease;
}

.welcome-logo:hover{
    transform: scale(1.08) rotate(3deg);
}

/* TITLE */
.welcome h2{
    color: white;
    font-size: 34px;

    margin-bottom: 15px;
}

/* TEXT */
.welcome p{
    color: rgba(255,255,255,0.85);

    font-size: 18px;
    line-height: 1.7;
}

/* RESPONSIVE */
@media(max-width: 768px){

    .topbar{
        padding: 0 15px;
    }

    .topbar-title{
        font-size: 20px;
    }

    .topbar-brand img{
        width: 45px;
        height: 45px;
    }

    .welcome-logo{
        width: 110px;
        height: 110px;
    }

    .welcome h2{
        font-size: 26px;
    }

    .welcome p{
        font-size: 16px;
    }

    .btn-back{
        font-size: 13px;
        padding: 8px 14px;
    }
}

    .btn-back {
      padding: 6px 12px; background: transparent; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-muted); font-size: 12px; cursor: pointer;
      font-family: 'IBM Plex Sans Arabic', sans-serif; transition: all 0.15s;
    }
    .btn-back:hover { border-color: var(--accent2); color: var(--accent2); }

    .topbar-logo { width: 32px; height: 32px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .topbar-title { font-size: 14px; font-weight: 700; font-family: 'JetBrains Mono', monospace; flex: 1; }
    .topbar-user { font-size: 12px; color: var(--text-muted); }
    .topbar-user span { color: var(--accent2); font-weight: 600; }

    .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
    .chat::-webkit-scrollbar { width: 4px; }
    .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .welcome { margin: auto; text-align: center; padding: 30px 16px; max-width: 380px; }
    .welcome-icon { font-size: 44px; margin-bottom: 12px; display: block; }
    .welcome h2 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .welcome p { font-size: 13px; color: var(--text-muted); line-height: 1.7; }

    .msg-row { display: flex; gap: 10px; animation: msgIn 0.25s ease; align-items: flex-start; }
    @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px; }
    .msg-avatar.ai { background: var(--accent); }
    .msg-avatar.user { background: var(--user-bg); font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: #79c0ff; }

    .msg-content { max-width: 78%; }
    .msg-name { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
    .msg-bubble { padding: 12px 14px; border-radius: 10px; font-size: 14px; line-height: 1.8; word-wrap: break-word; white-space: pre-wrap; }
    .msg-row.ai   .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 2px 10px 10px 10px; }
    .msg-row.user .msg-bubble { background: var(--user-bg); color: #cae8ff; border-radius: 10px 2px 10px 10px; text-align: right; }
    .msg-time { font-size: 10px; color: var(--text-dim); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
    .msg-row.user .msg-time { text-align: left; }

    .typing-bubble { background: var(--surface); border: 1px solid var(--border); padding: 14px 16px; border-radius: 2px 10px 10px 10px; display: flex; align-items: center; gap: 10px; }
    .typing-label { font-size: 12px; color: var(--text-muted); }
    .dots { display: flex; gap: 4px; align-items: center; }
    .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: dotPulse 1.4s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
    .dot:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }
    @keyframes dotPulse { 0%,80%,100% { transform:scale(0.6); opacity:0.4; } 40% { transform:scale(1); opacity:1; } }

    .input-area { padding: 12px 20px 16px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
    .input-row { display: flex; gap: 8px; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 8px 8px 8px 12px; transition: border-color 0.2s; }
    .input-row:focus-within { border-color: var(--accent2); }
    #msg { flex: 1; background: transparent; border: none; outline: none; font-size: 14px; color: var(--text); font-family: 'IBM Plex Sans Arabic', sans-serif; direction: rtl; padding: 4px 0; }
    #msg::placeholder { color: var(--text-dim); }
    .send-btn { width: 36px; height: 36px; background: var(--accent); border: none; border-radius: 7px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; transition: all 0.15s; }
    .send-btn:hover:not(:disabled) { background: #3fb950; transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .input-footer { display: flex; justify-content: space-between; margin-top: 6px; padding: 0 2px; }
    .input-hint { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
    .footer-brand { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
    .footer-brand span { color: var(--accent2); }

    @media (max-width: 480px) { .msg-content { max-width: 88%; } }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    
    <button class="btn-back" onclick="window.location.href='dashboard.html'">
        ← Dashboard
    </button>

    <!-- LOGO -->
    <div class="topbar-brand">
        <img src="./images/logos/logo.png" alt="AMA IA Logo">
        <div class="topbar-title">AMA IA</div>
    </div>

    <div class="topbar-user">
        مرحباً <span id="topbarName">...</span>
    </div>

</div>

<!-- CHAT -->
<div class="chat" id="chat">

    <div class="welcome" id="welcome">

        <!-- LOGO -->
        <img class="welcome-logo" src="./images/logos/logo.png" alt="">

        <h2>أهلاً! أنا AMA IA</h2>

        <p>
            سألني عن أي درس في الإعلاميات وسأشرحه ليك بالدارجة
        </p>

    </div>

</div>

<div class="input-area">
  <div class="input-row">
    <input id="msg" type="text" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter') send()">
    <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
  </div>
  <div class="input-footer">
    <span class="input-hint">Enter لإرسال</span>
    <span class="footer-brand">by <span>AMA</span></span>
  </div>
</div>

<script>
const WEBHOOK_URL = "https://ayoubamahrouch.app.n8n.cloud/webhook/chat-ai";
const taleb = JSON.parse(localStorage.getItem('taleb') || 'null');
if (!taleb) window.location.href = 'index.html';
document.getElementById('topbarName').textContent = taleb?.nom || '';

function getTime() { return new Date().toLocaleTimeString('fr-MA', { hour: '2-digit', minute: '2-digit' }); }
function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function removeWelcome() { const w = document.getElementById('welcome'); if (w) w.remove(); }

function addMessage(text, isUser = false) {
  removeWelcome();
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = `msg-row ${isUser ? 'user' : 'ai'}`;
  if (isUser) {
    row.innerHTML = `<div class="msg-avatar user">AA</div><div class="msg-content"><div class="msg-bubble">${escapeHtml(text)}</div><div class="msg-time">${getTime()}</div></div>`;
  } else {
    row.innerHTML = `<div class="msg-avatar ai">🤖</div><div class="msg-content"><div class="msg-name">AMA IA</div><div class="msg-bubble">${escapeHtml(text)}</div><div class="msg-time">${getTime()}</div></div>`;
  }
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  removeWelcome();
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row ai'; row.id = 'typing';
  row.innerHTML = `<div class="msg-avatar ai">🤖</div><div class="msg-content"><div class="msg-name">AMA IA</div><div class="typing-bubble"><span class="typing-label">كيتفكر...</span><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() { const el = document.getElementById('typing'); if (el) el.remove(); }

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function fetchWithRetry(url, options, retries = 3) {
  for (let i = 0; i < retries; i++) {
    try {
      const res = await fetch(url, options);
      const text = await res.text();
      if (!text || !text.trim()) { if (i < retries - 1) { await sleep(1000); continue; } throw new Error('الخادم ما رد'); }
      try { return JSON.parse(text); } catch { return { reply: text }; }
    } catch (err) { if (i === retries - 1) throw err; await sleep(1000 * (i + 1)); }
  }
}

async function send() {
  const msg = document.getElementById('msg');
  const btn = document.getElementById('sendBtn');
  if (!msg.value.trim()) return;

  const userMsg = `[تلميذ: ${taleb.nom} — ${taleb.niveau}] ${msg.value}`;
  addMessage(msg.value, true);
  msg.value = ''; btn.disabled = true; showTyping();

  try {
    const data = await fetchWithRetry(WEBHOOK_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: userMsg })
    });
    removeTyping();
    const reply = data.reply || data.choices?.[0]?.message?.content || data.message || 'معندي جواب دابا';
    addMessage(reply, false);
  } catch (err) {
    removeTyping();
    addMessage('خطأ: ' + err.message, false);
  }
  btn.disabled = false; msg.focus();
}

// Auto question from dashboard
const autoQ = localStorage.getItem('aiQuestion');
if (autoQ) { localStorage.removeItem('aiQuestion'); document.getElementById('msg').value = autoQ; send(); }
</script>
</body>
</html>
